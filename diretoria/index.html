
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>Street Football - Dashboard</title>
    <meta property="og:title" content="Street Football - Dashboard Oficial">
<meta property="og:description" content="Acompanhe os scouts, estatísticas e a diretoria do Street Football em tempo real.">
<meta property="og:image" content="https://streetdashboard.com.br/logo-preview.png">
<meta property="og:url" content="https://streetdashboard.com.br">
<meta property="og:type" content="website">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Street Football - Dashboard">
<meta name="twitter:image" content="https://streetdashboard.com.br/logo-preview.png">
    <style>
        /* Garante que o sistema ocupe a tela toda sem bordas */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%;
            overflow: hidden; 
            background-color: #07090f; /* Cor do fundo do seu app */
        }
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            display: block;
        }
    </style>
</head>
<body>
   <iframe id="painelStreet" src="https://script.google.com/macros/s/AKfycbzYxAVp76yu_7W4TlGImf1GzQ9EbGQ6d5iPvaxA_4NQkOiSluIyy5EgZxvoGt-mTIMjZQ/exec?page=diretoria"></iframe>

    <script>
        // Truque para o botão voltar do Android:
        // Quando o usuário tentar voltar, ele avisa o iframe para mudar a aba interna
        window.onpopstate = function(event) {
            const iframe = document.getElementById('painelStreet');
            iframe.contentWindow.postMessage('goBack', '*');
        };

        // Escuta mensagens do sistema interno para manter o histórico do domínio limpo
        window.addEventListener('message', function(e) {
            if (e.data === 'pushState') {
                window.history.pushState({}, '');
            }
        });
    </script>
</body>
</html>
